---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build
        run: nix build
      - name: Pre-commit checks
        run: nix develop --command bash -c 'lefthook run pre-commit --all-files'
      - name: Pre-push checks
        run: nix develop --command bash -c 'lefthook run pre-push --all-files'
